<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Wallet - Secure Cloud Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        glass: { light: 'rgba(255, 255, 255, 0.45)', dark: 'rgba(15, 23, 42, 0.45)' },
                        brand: { blue: '#2563eb', bgGray: '#f8fafc' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .font-mono-card { font-family: 'Share Tech Mono', monospace; }
        .glassmorphism {
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.2);
        }
        .dark .glassmorphism { border: 1px solid rgba(255, 255, 255, 0.06); background: rgba(15, 23, 42, 0.3); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 min-h-screen antialiased selection:bg-indigo-500 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbwHpk2AqTqIkzALYkACzH-KcJQJfG8UOUpbBoSY2Slg6zMJFkVoxkRRIkWzFWfQY2uLrg/exec";

        const Icon = ({ name, className = "w-4 h-4" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconEl = document.createElement('i');
                    iconEl.setAttribute('data-lucide', name);
                    iconEl.className = className;
                    iconRef.current.appendChild(iconEl);
                    window.lucide.createIcons({ nodeList: [iconEl] });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const CARD_THEMES = [
            { id: 'cosmic', name: 'Cosmic Purple', bg: 'bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500', hex: '#6366f1' },
            { id: 'emerald', name: 'Malachite Green', bg: 'bg-gradient-to-br from-emerald-500 via-teal-600 to-cyan-700', hex: '#10b981' },
            { id: 'midnight', name: 'Obsidian Noir', bg: 'bg-gradient-to-br from-slate-900 via-slate-800 to-neutral-900', hex: '#0f172a' },
            { id: 'sunset', name: 'Crimson Sunset', bg: 'bg-gradient-to-br from-orange-500 via-amber-500 to-red-600', hex: '#f97316' },
            { id: 'cyberpunk', name: 'Cyber Neon', bg: 'bg-gradient-to-br from-fuchsia-600 to-cyan-500', hex: '#d946ef' }
        ];

        const CARD_NETWORKS = ['Visa', 'Mastercard', 'RuPay', 'Amex', 'Discover', 'Other'];
        const VAULT_CATEGORIES = ['My Cards', 'Friends', 'Family'];

        function App() {
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('theme') === 'dark');
            const [cards, setCards] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [syncStatus, setSyncStatus] = useState('IDLE'); 
            
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isSystemBlocked, setIsSystemBlocked] = useState(false);
            const [activePassword, setActivePassword] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [authFeedback, setAuthFeedback] = useState('');

            const [activeCategoryTab, setActiveCategoryTab] = useState('My Cards');
            const [searchQuery, setSearchQuery] = useState('');
            const [revealedCards, setRevealedCards] = useState({});
            const [expandedActions, setExpandedActions] = useState({});
            
            const [isAddOpen, setIsAddOpen] = useState(false);
            const [isEditOpen, setIsEditOpen] = useState(false);
            const [currentCard, setCurrentCard] = useState(null);
            const [toasts, setToasts] = useState([]);

            const [formData, setFormData] = useState({
                id: '', assetType: 'CARD', category: 'My Cards', bankName: '', cardholderName: '',
                cardNumber: '', expiryMonth: '01', expiryYear: '2026', cvv: '', cardType: 'Visa',
                themeId: 'cosmic', accountNumber: '', ifscCode: '', socialPlatform: '', socialUser: '', socialPass: '',
                title: '', websiteUrl: '', username: '', password: '', notes: '',
                credit_or_debit: 'CREDIT'
            });

            const currentYearNum = new Date().getFullYear();
            const yearOptions = Array.from({ length: 15 }, (_, i) => currentYearNum + i);

            const showToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            };

            const copyText = (text) => {
                if (!text) return;
                const cleanText = String(text).trim();
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(cleanText)
                        .then(() => showToast("Copied to secure clipboard!"))
                        .catch(() => fallbackCopyText(cleanText));
                } else {
                    fallbackCopyText(cleanText);
                }
            };

            const fallbackCopyText = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast("Copied to secure clipboard!");
                } catch (err) {
                    showToast("Failed to copy credential", "error");
                }
                document.body.removeChild(textArea);
            };

            const compileItemDetails = (item) => {
                if (item.assetType === 'BANK') {
                    return `Bank: ${item.bankName || 'N/A'}\nHolder: ${item.cardholderName || 'N/A'}\nAccount No: ${item.accountNumber || 'N/A'}\nIFSC Code: ${item.ifscCode || 'N/A'}`;
                } else if (item.assetType === 'SOCIAL') {
                    return `Platform: ${item.socialPlatform || 'N/A'}\nUser/Email: ${item.socialUser || 'N/A'}\nPassword: ${item.socialPass || 'N/A'}`;
                } else if (item.assetType === 'WEB_CREDENTIAL') {
                    return `Site: ${item.title || 'N/A'}\nURL: ${item.websiteUrl || 'N/A'}\nUsername: ${item.username || 'N/A'}\nPassword: ${item.password || 'N/A'}`;
                } else {
                    return `Bank: ${item.bankName || 'N/A'}\nType: ${item.credit_or_debit || 'CREDIT'} (${item.cardType || 'Visa'})\nHolder: ${item.cardholderName || 'N/A'}\nCard No: ${item.cardNumber || 'N/A'}\nExpiry: ${item.expiryMonth || '01'}/${item.expiryYear || '2026'}\nCVV: ${item.cvv || '•••'}`;
                }
            };

            const copyAllDetails = (item) => {
                copyText(compileItemDetails(item));
            };

            const handleWhatsAppShare = (item) => {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(compileItemDetails(item))}`, '_blank');
            };

            const toggleActions = (id, e) => {
                e.stopPropagation();
                setExpandedActions(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const handleCloudUnlock = (e) => {
                if (e && e.preventDefault) e.preventDefault();
                setAuthFeedback('Contacting database firewall...');
                const callbackName = 'auth_' + Math.round(100000 * Math.random());
                
                window[callbackName] = function(res) {
                    if (res.status === "SUCCESS") {
                        setActivePassword(passwordInput);
                        setIsAuthenticated(true);
                        setAuthFeedback("");
                        fetchFromGoogleSheet();
                    } else if (res.status === "BLOCKED") {
                        setIsSystemBlocked(true);
                        setAuthFeedback(res.message);
                    } else {
                        setAuthFeedback(res.remainingAttempts !== undefined ? `Access Denied! Remaining attempts: ${res.remainingAttempts}` : `Access Denied!`);
                    }
                    delete window[callbackName];
                    const scriptEl = document.getElementById(callbackName);
                    if (scriptEl) scriptEl.remove();
                };

                const script = document.createElement('script');
                script.src = `${GOOGLE_SHEET_API_URL}?action=VERIFY_PASSWORD&password=${encodeURIComponent(passwordInput)}&userAgent=${encodeURIComponent(navigator.userAgent)}&callback=${callbackName}`;
                script.id = callbackName;
                document.body.appendChild(script);
            };

            const fetchFromGoogleSheet = () => {
                setIsLoading(true);
                const callbackName = 'fetch_' + Math.round(100000 * Math.random());
                window[callbackName] = function(data) {
                    if (data && Array.isArray(data)) {
                        setCards(data);
                    }
                    setIsLoading(false);
                    delete window[callbackName];
                    const scriptEl = document.getElementById(callbackName);
                    if (scriptEl) scriptEl.remove();
                };

                const script = document.createElement('script');
                script.src = `${GOOGLE_SHEET_API_URL}?action=FETCH_ALL&callback=${callbackName}&_ts=${Date.now()}`;
                script.id = callbackName;
                document.body.appendChild(script);
            };

            const pushToGoogleSheet = (updatedCards) => {
                setSyncStatus('SAVING');
                const callbackName = 'sync_' + Math.round(100000 * Math.random());
                
                window[callbackName] = function(res) {
                    if (res && res.status === "SUCCESS") {
                        setSyncStatus('SUCCESS');
                        showToast("Cloud tables synced safely!");
                    } else {
                        setSyncStatus('FAILED');
                        showToast("Background sync failed", "error");
                    }
                    setTimeout(() => { setSyncStatus('IDLE'); }, 3000);

                    delete window[callbackName];
                    const scriptEl = document.getElementById(callbackName);
                    if (scriptEl) scriptEl.remove();
                };

                const script = document.createElement('script');
                const cleanPayload = encodeURIComponent(JSON.stringify(updatedCards));
                script.src = `${GOOGLE_SHEET_API_URL}?action=SYNC_ALL&data=${cleanPayload}&password=${encodeURIComponent(activePassword)}&callback=${callbackName}`;
                script.id = callbackName;
                document.body.appendChild(script);
            };

            useEffect(() => {
                if (darkMode) { document.documentElement.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
                else { document.documentElement.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [darkMode]);

            const filteredCards = useMemo(() => {
                return cards.filter(c => {
                    const matchesTab = (c.category || 'My Cards') === activeCategoryTab;
                    const matchSearch = String(c.bankName || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
                                        String(c.cardholderName || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
                                        String(c.cardNumber || "").includes(searchQuery) ||
                                        String(c.socialPlatform || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
                                        String(c.title || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
                                        String(c.username || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
                                        String(c.accountNumber || "").includes(searchQuery);
                    return matchesTab && matchSearch;
                }).sort((a, b) => {
                    const aPinned = a.isPinned === 'true' || a.isPinned === true;
                    const bPinned = b.isPinned === 'true' || b.isPinned === true;
                    if (aPinned && !bPinned) return -1;
                    if (!aPinned && bPinned) return 1;
                    return 0;
                });
            }, [cards, activeCategoryTab, searchQuery]);

            const formatCardNumber = (num, revealed) => {
                if (!num) return '';
                const clean = String(num).replace(/\D/g, '');
                if (revealed) {
                    return clean.replace(/(.{4})/g, '$1 ').trim();
                }
                return `•••• •••• •••• ${clean.slice(-4)}`;
            };

            const handleCardNumberChange = (e) => {
                const value = e.target.value.replace(/\D/g, '');
                if (value.length <= 16) {
                    setFormData({ ...formData, cardNumber: value });
                }
            };

            const togglePin = (id, e) => {
                if(e) e.stopPropagation();
                const updated = cards.map(c => c.id === id ? {...c, isPinned: (c.isPinned === 'true' || c.isPinned === true) ? 'false' : 'true'} : c);
                setCards(updated);
                pushToGoogleSheet(updated);
            };

            const openAddModal = () => {
                setFormData({
                    id: '', assetType: 'CARD', category: activeCategoryTab, bankName: '', cardholderName: '',
                    cardNumber: '', expiryMonth: '01', expiryYear: String(currentYearNum), cvv: '', cardType: 'Visa',
                    themeId: 'cosmic', accountNumber: '', ifscCode: '', socialPlatform: '', socialUser: '', socialPass: '',
                    title: '', websiteUrl: '', username: '', password: '', notes: '',
                    credit_or_debit: 'CREDIT'
                });
                setIsAddOpen(true);
            };

            const saveNewCard = (e) => {
                e.preventDefault();
                const freshAsset = { ...formData, id: Date.now().toString(), isPinned: 'false' };
                const updated = [freshAsset, ...cards];
                setCards(updated);
                setIsAddOpen(false);
                pushToGoogleSheet(updated);
            };

            const openEditModal = (asset, e) => {
                if(e) e.stopPropagation();
                setCurrentCard(asset);
                setFormData({ ...asset, credit_or_debit: asset.credit_or_debit || 'CREDIT' });
                setIsEditOpen(true);
            };

            const saveEditCard = (e) => {
                e.preventDefault();
                const updated = cards.map(c => c.id === currentCard.id ? { ...formData, id: currentCard.id, isPinned: c.isPinned } : c);
                setCards(updated);
                setIsEditOpen(false);
                pushToGoogleSheet(updated);
            };

            const deleteCard = (id) => {
                if(confirm("Are you sure you want to completely erase this record from cloud synchronization tables?")) {
                    const updated = cards.filter(c => c.id !== id);
                    setCards(updated);
                    setIsEditOpen(false);
                    pushToGoogleSheet(updated);
                }
            };

            const activeTabIndex = VAULT_CATEGORIES.indexOf(activeCategoryTab);

            if (!isAuthenticated) {
                return (
                    <div className="fixed inset-0 bg-slate-950 text-white flex flex-col items-center justify-center p-4 z-50">
                        <div className="w-full max-w-sm glassmorphism p-6 rounded-2xl text-center space-y-6 bg-slate-900/40">
                            <div className={`w-14 h-14 rounded-2xl flex items-center justify-center mx-auto border ${isSystemBlocked ? 'bg-red-500/20 text-red-400 border-red-500/30' : 'bg-indigo-600/20 text-indigo-400 border-indigo-500/30'}`}>
                                <Icon name={isSystemBlocked ? "slash" : "lock"} className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight">{isSystemBlocked ? 'Permanent Lockdown' : 'Secure Protection Vault'}</h1>
                                <p className="text-slate-400 text-xs mt-1">Authorization Required</p>
                            </div>
                            {!isSystemBlocked ? (
                                <form onSubmit={handleCloudUnlock} className="space-y-4">
                                    <input 
                                        type="password"
                                        pattern="[0-9]*"
                                        inputMode="numeric"
                                        autoComplete="current-password"
                                        required 
                                        placeholder="Enter Security Master Pin" 
                                        value={passwordInput} 
                                        onChange={e => setPasswordInput(e.target.value.replace(/\D/g, ''))} 
                                        className="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-center tracking-widest font-mono text-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-white" 
                                    />
                                    {authFeedback && <p className="text-amber-400 text-xs px-2 animate-pulse">{authFeedback}</p>}
                                    <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] py-3 rounded-xl font-semibold transition text-sm text-white">Unlock Vault Infrastructure</button>
                                </form>
                            ) : (
                                <p className="text-red-400 text-xs font-semibold">{authFeedback}</p>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50 transition-colors duration-300 pb-24">
                    
                    {/* Toast Notification Stream */}
                    <div className="fixed bottom-20 left-4 right-4 md:left-auto md:right-5 z-50 space-y-2 pointer-events-none max-w-sm">
                        {toasts.map(toast => (
                            <div key={toast.id} className={`p-3.5 rounded-xl shadow-xl text-white font-medium text-xs flex items-center space-x-3 pointer-events-auto border ${toast.type === 'error' ? 'bg-red-600 border-red-500' : 'bg-slate-900/95 dark:bg-slate-900 border-slate-800'}`}>
                                <Icon name={toast.type === 'error' ? "alert-triangle" : "check-circle"} className="w-4 h-4 shrink-0 text-amber-300" />
                                <span className="tracking-wide">{toast.message}</span>
                            </div>
                        ))}
                    </div>

                    {/* App Header Bar */}
                    <header className="sticky top-0 z-30 glassmorphism border-b border-slate-200/60 dark:border-slate-800/60 px-4 py-3 flex justify-between items-center backdrop-blur-md">
                        <div className="flex items-center space-x-2">
                            <div className="p-2 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-xl text-white">
                                <Icon name="wallet" className="w-4 h-4" />
                            </div>
                            <span className="text-base font-bold bg-gradient-to-r from-slate-900 to-slate-700 dark:from-white dark:to-slate-300 bg-clip-text text-transparent">Vaulted</span>
                            
                            <div className="ml-1">
                                {syncStatus === 'SAVING' && <span className="w-2 h-2 rounded-full bg-amber-500 block animate-ping"></span>}
                                {syncStatus === 'SUCCESS' && <span className="w-2 h-2 rounded-full bg-emerald-50 block"></span>}
                                {syncStatus === 'FAILED' && <span className="w-2 h-2 rounded-full bg-red-500 block"></span>}
                                {syncStatus === 'IDLE' && <span className="w-2 h-2 rounded-full bg-emerald-500 block"></span>}
                            </div>
                        </div>
                        <div className="flex items-center space-x-1">
                            <button onClick={fetchFromGoogleSheet} disabled={isLoading} className="p-2 rounded-xl text-slate-500 active:bg-slate-200/50 dark:active:bg-slate-800/50"><Icon name="refresh-cw" className={`w-4 h-4 ${isLoading ? 'animate-spin' : ''}`} /></button>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-xl text-slate-500"><Icon name={darkMode ? "sun" : "moon"} className="w-4 h-4" /></button>
                            <button onClick={openAddModal} className="bg-indigo-600 text-white p-2 rounded-xl shadow-md"><Icon name="plus" className="w-4 h-4" /></button>
                        </div>
                    </header>

                    {/* Sliding Segmented Filter Controls */}
                    <div className="max-w-md mx-auto px-4 mt-4">
                        <div className="relative bg-slate-200/60 dark:bg-slate-900 border border-slate-300/40 dark:border-slate-800/40 p-1 rounded-xl flex shadow-inner">
                            <div 
                                className="absolute top-1 bottom-1 left-1 rounded-lg bg-white dark:bg-slate-800 shadow transition-all duration-200 ease-out"
                                style={{
                                    width: `calc(33.333% - 5px)`,
                                    transform: `translateX(calc(${activeTabIndex * 100}%))`
                                }}
                            />
                            {VAULT_CATEGORIES.map(tab => (
                                <button 
                                    key={tab} 
                                    onClick={() => setActiveCategoryTab(tab)} 
                                    className={`relative z-10 w-1/3 py-2 text-center text-xs font-semibold rounded-lg transition-colors ${activeCategoryTab === tab ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-500'}`}
                                >
                                    {tab}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Operational Search Bar Interface Container */}
                    <main className="max-w-4xl mx-auto px-4 py-4">
                        <div className="relative mb-6">
                            <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" className="w-4 h-4" /></span>
                            <input type="text" placeholder={`Search fields inside ${activeCategoryTab}...`} value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-9 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl text-xs focus:outline-none focus:border-indigo-500" />
                        </div>

                        {/* Flex Grid Rendering Pipeline Layer */}
                        {isLoading ? (
                            <div className="text-center py-20 text-slate-400 text-xs font-medium animate-pulse tracking-wider">Syncing cloud matrix records...</div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                {filteredCards.length === 0 ? (
                                    <div className="col-span-full border border-dashed border-slate-300 dark:border-slate-800 rounded-2xl p-8 text-center text-xs text-slate-400">No configured elements matched.</div>
                                ) : (
                                    filteredCards.map(item => {
                                        const theme = CARD_THEMES.find(t => t.id === item.themeId) || CARD_THEMES[0];
                                        const isRevealed = !!revealedCards[item.id];
                                        const isActionsOpen = !!expandedActions[item.id];
                                        const isPinnedItem = item.isPinned === 'true' || item.isPinned === true;
                                        
                                        {/* Core Component Block: Traditional Banking Ledger Nodes */}
                                        if (item.assetType === 'BANK') {
                                            return (
                                                <div key={item.id} onClick={(e) => toggleActions(item.id, e)} className="relative p-5 bg-gradient-to-br from-slate-800 to-zinc-900 border border-zinc-700/60 text-white min-h-[170px] flex flex-col justify-between overflow-hidden rounded-2xl shadow-md active:scale-[0.99] transition-transform">
                                                    <div className="flex justify-between items-start">
                                                        <div>
                                                            <p className="text-[9px] tracking-wider text-emerald-400 font-extrabold bg-emerald-500/10 px-1.5 py-0.5 rounded border border-emerald-500/20 inline-block uppercase">BANK ACCT</p>
                                                            <h4 className="text-base font-bold tracking-tight mt-1 truncate max-w-[150px]">{item.bankName || 'BANK ASSY'}</h4>
                                                        </div>
                                                        <div className="flex items-center space-x-1">
                                                            <button type="button" onClick={(e) => togglePin(item.id, e)} className="p-1.5 hover:bg-white/10 rounded-full"><Icon name="pin" className={`w-3.5 h-3.5 ${isPinnedItem ? 'fill-white text-amber-300' : 'opacity-60'}`} /></button>
                                                            <button type="button" onClick={(e) => openEditModal(item, e)} className="p-1.5 hover:bg-white/10 rounded-full"><Icon name="edit-2" className="w-3.5 h-3.5 opacity-60" /></button>
                                                        </div>
                                                    </div>
                                                    <div className="my-2">
                                                        <p className="opacity-40 text-[8px] uppercase tracking-wider font-bold">Account Number</p>
                                                        <div className="flex items-center justify-between">
                                                            <span className="text-base font-mono font-bold tracking-wider">
                                                                {isRevealed ? item.accountNumber : `•••• •••• ${item.accountNumber ? String(item.accountNumber).slice(-4) : '0000'}`}
                                                            </span>

                                                        <div className="flex items-center space-x-1.5">

                                                        <button type="button" onClick={(e) => { e.stopPropagation(); copyText(item.socialPass); }} className="flex flex-col items-center py-1 text-slate-300"><Icon name="key" className="w-4 h-4" /><span className="text-[9px] mt-0.5">Copy Pass</span></button>
                                                        <button type="button" onClick={(e) => { e.stopPropagation(); copyAllDetails(item); }} className="flex flex-col items-center py-1 text-slate-300"><Icon name="files" className="w-4 h-4" /><span className="text-[9px] mt-0.5">Copy All</span></button>

                                                        <div className="flex items-center space-x-1.5">

                                                        </div>
                                                        <div>
                                                            <p className="opacity-40 text-[8px] uppercase tracking-wider">Password Matrix</p>
                                                            <div className="flex items-center justify-between">
                                                                <span className="text-xs font-mono tracking-widest text-amber-300 font-bold">
                                                                    {isRevealed ? item.password : '••••••••'}
                                                                </span>
                                                                <button type="button" onClick={(e) => { e.stopPropagation(); setRevealedCards({...revealedCards, [item.id]: !isRevealed}) }} className="p-1"><Icon name={isRevealed ? "eye-off" : "eye"} className="w-4 h-4 opacity-60" /></button>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div id="actions-drawer" className={`absolute inset-x-0 bottom-0 bg-slate-900/95 border-t border-slate-800 p-2 grid grid-cols-3 gap-1 text-center transition-transform duration-200 z-20 ${isActionsOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                                                        <button type="button" onClick={(e) => { e.stopPropagation(); copyText(item.username); }} className="flex flex-col items-center py-1 text-slate-300"><Icon name="user" className="w-4 h-4" /><span className="text-[9px] mt-0.5">Copy ID</span></button>
                                                        <button type="button" onClick={(e) => { e.stopPropagation(); copyText(item.password); }} className="flex flex-col items-center py-1 text-slate-300"><Icon name="key" className="w-4 h-4" /><span className="text-[9px] mt-0.5">Copy Pass</span></button>

                                                    <div>
                                                        <p className="text-[8px] font-mono tracking-wider font-extrabold bg-black/20 border border-white/10 px-1.5 py-0.5 rounded text-amber-300 uppercase inline-block">
                                                            {item.credit_or_debit || 'CREDIT'}

                                                    </div>

                                                        <button type="button" onClick={(e) => openEditModal(item, e)} className="p-1.5 hover:bg-white/10 rounded-full"><Icon name="edit-2" className="w-3.5 h-3.5 opacity-60" /></button>

                                                    </div>
                                                    <div className="flex items-center space-x-2 text-xs opacity-95 mt-0.5">

                                                    <button type="button" onClick={(e) => { e.stopPropagation(); copyText(item.cardNumber); }} className="flex flex-col items-center py-1 text-slate-300"><Icon name="copy" className="w-4 h-4" /><span className="text-[9px] mt-0.5">Number</span></button>
                                                    <button type="button" onClick={(e) => { e.stopPropagation(); copyText(item.cvv); }} className="flex flex-col items-center py-1 text-slate-300"><Icon name="lock" className="w-4 h-4" /><span className="text-[9px] mt-0.5">CVV</span></button>

                                                    <button type="button" onClick={(e) => { e.stopPropagation(); handleWhatsAppShare(item); }} className="flex flex-col items-center py-1 text-emerald-400"><Icon name="message-square" className="w-4 h-4" /><span className="text-[9px] mt-0.5">Share</span></button>

                                            </div>
                                        </div>

                                            <input type="text" required placeholder="Username / Login Identifier" value={formData.username} onChange={e => setFormData({...formData, username: e.target.value})} className="w-full px-3.5 py-2.5 border dark:border-slate-800 rounded-xl bg-transparent font-mono focus:outline-none focus:border-indigo-500 text-slate-800 dark:text-white" />
                                            <input type="text" required placeholder="Password Key String" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className="w-full px-3.5 py-2.5 border dark:border-slate-800 rounded-xl bg-transparent font-mono focus:outline-none focus:border-indigo-500 text-slate-800 dark:text-white" />
                                        </div>
                                    )}

                                    {formData.assetType === 'CARD' && (
                                        <div className="space-y-3">
                                            <div>
                                                <div className="grid grid-cols-2 gap-2 bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">
                                                    <button type="button" onClick={() => setFormData({...formData, credit_or_debit: 'CREDIT'})} className={`py-1.5 rounded-lg text-xs font-semibold transition-all ${formData.credit_or_debit === 'CREDIT' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-sm' : 'text-slate-500'}`}>Credit</button>
                                                    <button type="button" onClick={() => setFormData({...formData, credit_or_debit: 'DEBIT'})} className={`py-1.5 rounded-lg text-xs font-semibold transition-all ${formData.credit_or_debit === 'DEBIT' ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-white shadow-sm' : 'text-slate-500'}`}>Debit</button>

                                            <input

                                            <div className="grid grid-cols-2 gap-3">

                                                <input type="password" pattern="[0-9]*" inputMode="numeric" required maxLength="4" placeholder="CVV" value={formData.cvv} onChange={e => setFormData({...formData, cvv: e.target.value.replace(/\D/g,'')})} className="px-3 py-2.5 border dark:border-slate-800 rounded-xl bg-transparent text-center font-mono focus:outline-none focus:border-indigo-500 text-slate-800 dark:text-white" />
                                            </div>
                                            <div className="flex flex-wrap gap-1.5 pt-1">
                                                {CARD_NETWORKS.map(net => <button key={net} type="button" onClick={() => setFormData({...formData, cardType: net})} className={`px-2.5 py-1.5 rounded-lg font-semibold border text-[10px] ${formData.cardType === net ? 'bg-indigo-600 text-white border-indigo-600 shadow' : 'bg-transparent text-slate-400 dark:border-slate-800'}`}>{net}</button>)}
                                            </div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Vault Folder</label>
                                            <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full px-2 py-2.5 border dark:border-slate-800 rounded-xl bg-transparent dark:bg-slate-800 text-slate-700 dark:text-slate-200">
                                                {VAULT_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Canvas Theme</label>
                                            <select value={formData.themeId} onChange={e => setFormData({...formData, themeId: e.target.value})} className="w-full px-2 py-2.5 border dark:border-slate-800 rounded-xl bg-transparent dark:bg-slate-800 text-slate-700 dark:text-slate-200">
                                                {CARD_THEMES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <div className="flex items-center justify-end space-x-2 pt-3 border-t dark:border-slate-800 shrink-0">
                                        <button type="button" onClick={() => setIsAddOpen(false)} className="px-4 py-2 border dark:border-slate-800 rounded-xl text-slate-600 dark:text-slate-300">Cancel</button>
                                        <button type="submit" className="px-5 py-2 bg-indigo-600 text-white rounded-xl font-bold shadow">Save Asset</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modification Properties Dynamic Update Modal */}
                    {isEditOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4 z-40">
                            <form onSubmit={saveEditCard} className="w-full max-w-md bg-white dark:bg-slate-900 rounded-t-[20px] sm:rounded-[20px] p-5 space-y-4 shadow-2xl max-h-[90vh] overflow-y-auto text-xs">
                                <div className="flex justify-between items-center border-b dark:border-slate-800 pb-2">
                                    <h3 className="font-bold text-base">Modify Asset Ledger Matrix</h3>
                                    <button type="button" onClick={() => setIsEditOpen(false)}><Icon name="x" className="w-5 h-5" /></button>
                                </div>
                                
                                {formData.assetType === 'BANK' && (
                                    <div className="space-y-3">
                                        <input type="text" required value={formData.bankName} onChange={e => setFormData({...formData, bankName: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent dark:border-slate-800" placeholder="Bank Name" />
                                        <input type="text" required value={formData.cardholderName} onChange={e => setFormData({...formData, cardholderName: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent dark:border-slate-800" placeholder="Holder Name" />
                                        <input type="text" pattern="[0-9]*" inputMode="numeric" required value={formData.accountNumber} onChange={e => setFormData({...formData, accountNumber: e.target.value.replace(/\D/g,'')})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent font-mono dark:border-slate-800" placeholder="Account Number" />
                                        <input type="text" required value={formData.ifscCode} onChange={e => setFormData({...formData, ifscCode: e.target.value.toUpperCase()})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent font-mono dark:border-slate-800" placeholder="IFSC Code" />
                                    </div>
                                )}

                                {formData.assetType === 'SOCIAL' && (
                                    <div className="space-y-3">
                                        <input type="text" required value={formData.socialPlatform} onChange={e => setFormData({...formData, socialPlatform: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent dark:border-slate-800" placeholder="Platform Name" />
                                        <input type="text" required value={formData.socialUser} onChange={e => setFormData({...formData, socialUser: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent font-mono dark:border-slate-800" placeholder="Username / Email" />
                                        <input type="text" required value={formData.socialPass} onChange={e => setFormData({...formData, socialPass: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent font-mono dark:border-slate-800" placeholder="Password Entry Key" />
                                    </div>
                                )}

                                {formData.assetType === 'WEB_CREDENTIAL' && (
                                    <div className="space-y-3">
                                        <input type="text" required value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent dark:border-slate-800" placeholder="Title Context" />
                                        <input type="text" value={formData.websiteUrl} onChange={e => setFormData({...formData, websiteUrl: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent font-mono dark:border-slate-800" placeholder="Website Link URL" />
                                        <input type="text" required value={formData.username} onChange={e => setFormData({...formData, username: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent font-mono dark:border-slate-800" placeholder="Username" />
                                        <input type="text" required value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent font-mono dark:border-slate-800" placeholder="Password Key String" />
                                    </div>
                                )}

                                {formData.assetType === 'CARD' && (
                                    <div className="space-y-3">
                                        <input type="text" pattern="[0-9 ]*" inputMode="numeric" required value={formData.cardNumber} onChange={e => { const val = e.target.value.replace(/\D/g, ''); if(val.length<=16){setFormData({...formData, cardNumber: val});} }} className="w-full px-3 py-2.5 border rounded-xl bg-transparent font-mono dark:border-slate-800" placeholder="Card Number" />
                                        <input type="text" required value={formData.bankName} onChange={e => setFormData({...formData, bankName: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent dark:border-slate-800" placeholder="Bank Name" />
                                        <input type="text" required value={formData.cardholderName} onChange={e => setFormData({...formData, cardholderName: e.target.value})} className="w-full px-3 py-2.5 border rounded-xl bg-transparent dark:border-slate-800" placeholder="Holder Name" />
                                        <div className="grid grid-cols-3 gap-2">
                                            <select value={formData.expiryMonth} onChange={e => setFormData({...formData, expiryMonth: e.target.value})} className="border dark:border-slate-800 rounded-xl px-1 py-2 bg-transparent dark:bg-slate-900">{Array.from({ length: 12 }, (_, i) => String(i + 1).padStart(2, '0')).map(m => <option key={m} value={m}>{m}</option>)}</select>
                                            <select value={formData.expiryYear} onChange={e => setFormData({...formData, expiryYear: e.target.value})} className="border dark:border-slate-800 rounded-xl px-1 py-2 bg-transparent dark:bg-slate-900">{yearOptions.map(y => <option key={y} value={y}>{y}</option>)}</select>
                                            <input type="password" pattern="[0-9]*" inputMode="numeric" required maxLength="4" value={formData.cvv} onChange={e => setFormData({...formData, cvv: e.target.value.replace(/\D/g, '')})} className="border dark:border-slate-800 rounded-xl text-center py-2 bg-transparent" placeholder="CVV" />
                                        </div>
                                    </div>
                                )}
                                
                                <div className="grid grid-cols-2 gap-2">
                                    <select value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="border dark:border-slate-800 rounded-xl px-2 py-2 bg-transparent dark:bg-slate-900">{VAULT_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}</select>
                                    <select value={formData.themeId} onChange={e => setFormData({...formData, themeId: e.target.value})} className="border dark:border-slate-800 rounded-xl px-2 py-2 bg-transparent dark:bg-slate-900">{CARD_THEMES.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}</select>
                                </div>

                                <div className="flex gap-2 pt-2">
                                    <button type="button" onClick={() => deleteCard(currentCard.id)} className="w-1/3 bg-red-500/10 text-red-500 rounded-xl py-2.5 font-semibold">Delete</button>
                                    <button type="submit" className="w-2/3 bg-indigo-600 text-white rounded-xl py-2.5 font-semibold shadow">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
